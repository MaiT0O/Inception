server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name ebansse.42.fr;

    # Certificat SSL auto-signé
    ssl_certificate     /etc/ssl/certs/nginx.crt;
    ssl_certificate_key /etc/ssl/private/nginx.key;

    # ⚠️ TLSv1.2 ou TLSv1.3 UNIQUEMENT (obligatoire dans le sujet)
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Passer les fichiers PHP à WordPress (php-fpm) via le réseau Docker
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress:9000;   # "wordpress" = nom du service Docker
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}